version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: linkhub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: linkhub
      POSTGRES_PASSWORD: linkhub_secret
      POSTGRES_DB: linkhub_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/backend/src/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U linkhub -d linkhub_db']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
